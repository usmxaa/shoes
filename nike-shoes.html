<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Rewards USA | Claim Your Offer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 450px; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center;
        }

        .header-img { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 40px 20px; 
            color: white;
        }

        .header-img h2 { font-size: 28px; margin-bottom: 5px; }
        .header-img p { font-size: 14px; opacity: 0.9; }

        .content { padding: 30px 20px; }
        
        .status-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .offer-box {
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .offer-box:hover { border-color: #764ba2; }
        
        .offer-title { font-size: 16px; color: #444; margin-bottom: 5px; }
        .offer-value { font-size: 32px; font-weight: 700; color: #1a1a1a; }

        .btn {
            display: block;
            background: #764ba2;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); background: #5a368a; }

        .steps {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .step { font-size: 11px; color: #888; }
        .step i { display: block; font-style: normal; font-size: 18px; margin-bottom: 5px; }

        .footer { font-size: 10px; color: #bbb; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-img">
            <h2>Student Exclusive</h2>
            <p>USA University Rewards Program 2026</p>
        </div>

        <div class="content">
            <div class="status-badge">● System Status: Active</div>
            
            <div class="offer-box">
                <p class="offer-title">Your Available Reward:</p>
                <div class="offer-value">$750.00</div>
                <p style="font-size: 12px; color: #888;">Valid for: Shoes & Electronics</p>
            </div>

            <!-- Replace 'YOUR_LINK' with your actual CPA link -->
            <a href="https://smrturl.co/a/s0f386d23e3/19049?s1=" class="target-link btn">CLAIM REWARD NOW</a>

            <div class="steps">
                <div class="step"><i>📝</i> Register</div>
                <div class="step"><i>✅</i> Verify</div>
                <div class="step"><i>💰</i> Receive</div>
            </div>

            <p class="footer">
                Must be 18+ and a resident of the United States. <br>
                This offer is part of our student outreach program.
            </p>
        </div>
    </div>

</body>
</html>
